<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <nav>
    <h1>Tech Store</h1>
  </nav>
</header>

<main>

  <h2>Contact Us</h2>

  <form>

    <label for="name">Name</label>
    <input
      type="text"
      id="name"
      required
    >

    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      required
    >

    <label for="message">Message</label>
    <textarea
      id="message"
      rows="5"
      required
    ></textarea>

    <button type="submit">
      Send Message
    </button>

  </form>

</main>

</body>
</html>
